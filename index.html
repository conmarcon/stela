<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stella Info</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 20px; font-family: sans-serif;
            background: #1a2a6c;
            background: linear-gradient(180deg, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            background-attachment: fixed; color: white;
            display: flex; justify-content: center;
        }
        .card {
            width: 100%; max-width: 350px; background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 25px; padding: 20px; text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .flags { margin-bottom: 20px; display: flex; justify-content: center; gap: 15px; }
        .flag-btn { font-size: 30px; cursor: pointer; opacity: 0.4; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .flag-btn.active { opacity: 1; transform: scale(1.2); }
        
        h1 { color: #D4AF37; letter-spacing: 2px; margin: 10px 0; }
        .intro-box {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px;
            border-left: 4px solid #D4AF37; text-align: left; font-style: italic;
            line-height: 1.5; margin-bottom: 20px;
        }
        .item-btn {
            background: rgba(255,255,255,0.1); margin-bottom: 10px; padding: 18px;
            border-radius: 15px; border: 1px solid #D4AF37;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; font-weight: bold; -webkit-tap-highlight-color: transparent;
        }
        .item-btn i { color: #D4AF37; font-size: 1.2rem; pointer-events: none; }
        .item-btn span { pointer-events: none; }

        /* MODAL SYSTEM */
        #overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 10000; justify-content: center; align-items: center;
        }
        .popup {
            background: white; color: #222; width: 85%; max-width: 300px;
            border-radius: 20px; position: relative; overflow: hidden;
            animation: popIn 0.2s ease-out;
        }
        @keyframes popIn { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }
        .p-head { background: #1a2a6c; color: white; padding: 15px; font-weight: bold; }
        .p-body { padding: 20px; line-height: 1.6; font-size: 1.1rem; }
        .close-x {
            position: absolute; top: 10px; right: 15px; color: white;
            font-size: 28px; cursor: pointer; z-index: 10001; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">

            <span id="f-de" class="flag-btn" onclick="chL('de')" ontouchstart="chL('de')">🇩🇪</span>

        <h1 id="txt-name">ΣΤΕΛΑ</h1>
        <div id="txt-intro" class="intro-box">
            "Στέλα: Το άστρο της αυγής. Ένα όνομα που ακτινοβολεί λάμψη, συμβολίζοντας την καθοδήγηση, την ελπίδα και την αιώνια ομορφιά του ουρανού."
        </div>

        <div class="item-btn" onclick="shP(0)" ontouchstart="shP(0)"><i class="fas fa-scroll"></i> <span id="b0">Ετυμολογία & Σημασία</span></div>
        <div class="item-btn" onclick="shP(1)" ontouchstart="shP(1)"><i class="fas fa-landmark"></i> <span id="b1">Καλλιτεχνική Αύρα</span></div>
        <div class="item-btn" onclick="shP(2)" ontouchstart="shP(2)"><i class="fas fa-cross"></i> <span id="b2">Πνευματική Σημασία</span></div>
        <div class="item-btn" onclick="shP(3)" ontouchstart="shP(3)"><i class="fas fa-sparkles"></i> <span id="b3">Προσωπικότητα</span></div>
    </div>

    <div id="overlay" onclick="clP()" ontouchstart="clP()">
        <div class="popup" onclick="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <div class="close-x" onclick="clP()" ontouchstart="clP()">&times;</div>
            <div class="p-head" id="p-title">Τίτλος</div>
            <div class="p-body" id="p-desc">Περιγραφή...</div>
        </div>
    </div>
